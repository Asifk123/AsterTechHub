</div>
</div>

</div>
</div>

<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary/60 text-lg" data-icon="lock">lock</span>
<input class="w-full bg-surface-container-highest/50 border border-outline-variant/20 rounded-md py-3.5 pl-12 pr-4 text-on-surface placeholder:text-on-surface-variant/30 focus:outline-none focus:border-primary/40 focus:ring-1 focus:ring-primary/40 transition-all" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="space-y-2">
<label class="text-xs font-headline uppercase tracking-widest text-on-surface-variant/80 ml-1">Confirm</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary/60 text-lg" data-icon="security">security</span>

</div>
