<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .digital-grid {
            background-image: 
                linear-gradient(to right, rgba(0, 212, 255, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 212, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .radial-vignette {
            background: radial-gradient(circle at center, transparent 0%, #0a0a0f 80%);
        }
        .glow-orbit {
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.2);
        }
    </style>
</head>
<body class="bg-background text-on-background font-body selection:bg-primary/30 min-h-screen overflow-hidden flex flex-col items-center justify-center relative">
<!-- Digital Environment Layer -->
<div class="fixed inset-0 digital-grid opacity-30 z-0"></div>
<div class="fixed inset-0 radial-vignette z-10"></div>
<!-- Orbiting Particle Simulation (Visual Representation) -->
<div class="absolute inset-0 z-10 overflow-hidden pointer-events-none">
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] border border-primary/5 rounded-full blur-sm"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] border border-secondary/5 rounded-full blur-sm"></div>
<!-- Decorative "Particles" -->
<div class="absolute top-1/4 left-1/3 w-1 h-1 bg-primary-container rounded-full shadow-[0_0_10px_#00d4ff]"></div>
<div class="absolute bottom-1/4 right-1/4 w-1.5 h-1.5 bg-secondary-fixed-dim rounded-full shadow-[0_0_10px_#d9b9ff] opacity-40"></div>
<div class="absolute top-1/2 right-1/10 w-0.5 h-0.5 bg-white rounded-full shadow-[0_0_8px_#fff]"></div>
</div>
<!-- Main Terminal Container -->
<main class="relative z-20 flex flex-col items-center max-w-2xl w-full px-6 text-center">
<!-- Brand Core -->
<div class="mb-16 relative">
<!-- Backlight Glow -->
<div class="absolute inset-0 bg-primary/20 blur-[60px] rounded-full scale-150"></div>
<div class="relative p-10 rounded-xl bg-white/5 backdrop-blur-2xl border border-white/10 shadow-2xl flex items-center justify-center">
<img alt="Aster Tech Hub Logo" class="h-32 w-auto brightness-110 drop-shadow-[0_0_15px_rgba(0,212,255,0.4)]" data-purpose="brand-logo" src="https://lh3.googleusercontent.com/aida/ADBb0uhga187jUXfMz55EMrjagPCcSF5hdsEhukM04GQyjq4BIK26tJztftEHDxBx5pOBcH47p0W78ms6I3tPiAgEpWP4WGTIsbNwuJKkrk8ppZxBusrcEGw1Usuf_ObvtUCKiuYsLCaXsprDSKqID6V528ukW_m7SYZkT_hQS3uH4ENjCKvJXw8IMQ6GDgvbXnI_wx-Ldc9xksylbbHg1st1pis9nEYcUkcW3NPN8QxBJg0ZIHG9glDi7gMVdhJ3q_fV4z_pAe55S7rng"/>
</div>
</div>
<!-- Progress Interaction Section -->
<div class="w-full space-y-8 flex flex-col items-center">
<!-- Sleek Horizontal Loader -->
<div class="w-full max-w-md h-1.5 bg-surface-container-highest rounded-full overflow-hidden relative border border-white/5">
<!-- Pulse Bar -->
<div class="absolute top-0 left-0 h-full w-2/3 bg-gradient-to-r from-primary to-primary-container rounded-full shadow-[0_0_15px_#00d4ff]"></div>
<!-- Scanning Effect Overlay -->
<div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/40 to-transparent w-20 translate-x-[200%] h-full"></div>
</div>
<!-- Status Communication -->
<div class="space-y-3">
<p class="font-headline tracking-[0.2em] text-primary-container text-sm uppercase opacity-90 drop-shadow-sm">
                    Syncing with the Frontier...
                </p>
<div class="flex items-center justify-center gap-4 text-[10px] font-mono text-on-surface-variant tracking-widest uppercase">
<span class="flex items-center gap-1.5">
<span class="w-1.5 h-1.5 rounded-full bg-primary-container glow-orbit"></span>
                        Neural Link: Active
                    </span>
<span class="opacity-20">|</span>
<span class="flex items-center gap-1.5">
<span class="w-1.5 h-1.5 rounded-full bg-secondary-container"></span>
                        Buffer: 89%
                    </span>
<span class="opacity-20">|</span>
<span class="flex items-center gap-1.5 text-primary">
<span class="material-symbols-outlined text-[12px]" style="font-variation-settings: 'FILL' 1;">terminal</span>
                        Terminal: 0x4FF
                    </span>
</div>
</div>
</div>
<!-- Glassmorphism Data Cards (Asymmetric Layout) -->
<div class="mt-24 grid grid-cols-1 md:grid-cols-3 gap-6 w-full opacity-60">
<div class="bg-white/5 backdrop-blur-md p-4 border-l-2 border-primary/40 rounded-r-lg text-left">
<span class="block text-[10px] text-primary mb-1 font-headline uppercase tracking-tighter">Core Latency</span>
<span class="text-xl font-headline text-on-surface">14.2ms</span>
</div>
<div class="bg-white/5 backdrop-blur-md p-4 border-l-2 border-secondary/40 rounded-r-lg text-left translate-y-4">
<span class="block text-[10px] text-secondary mb-1 font-headline uppercase tracking-tighter">Nodes Connected</span>
<span class="text-xl font-headline text-on-surface">1,024</span>
</div>
<div class="bg-white/5 backdrop-blur-md p-4 border-l-2 border-outline/40 rounded-r-lg text-left">
<span class="block text-[10px] text-on-surface-variant mb-1 font-headline uppercase tracking-tighter">Encryption</span>
<span class="text-xl font-headline text-on-surface">AES-512</span>
</div>
</div>
</main>
<!-- Footer Decorative Attribution -->
<footer class="absolute bottom-8 z-30 w-full px-12 flex justify-between items-center border-t border-white/5 pt-6">
<div class="text-[10px] text-slate-500 font-headline tracking-widest uppercase">
            © 2024 Aster Tech Hub. Davangere, India.
        </div>
<div class="flex gap-6">
<div class="w-8 h-[1px] bg-primary/20"></div>
<div class="w-12 h-[1px] bg-primary/50"></div>
<div class="w-8 h-[1px] bg-primary/20"></div>
</div>
<div class="flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-error/40 animate-pulse"></span>
<span class="text-[10px] text-slate-500 font-headline tracking-widest uppercase">Secure Connection Verified</span>
</div>
</footer>
<!-- Background Tracer (Pulse Tracer Signature) -->
<div class="fixed top-0 left-0 w-1/3 h-[2px] bg-gradient-to-r from-transparent via-secondary to-transparent blur-[1px]"></div>
